<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automerge + ProseMirror Demo</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f8fafc;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #dbe2ea;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 12px 0;
      }

      button {
        font: inherit;
        padding: 8px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        cursor: pointer;
      }

      button:hover:enabled {
        background: #eef2f7;
      }

      button.active {
        background: #dbeafe;
        border-color: #93c5fd;
        color: #1d4ed8;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .editor-shell {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        min-height: 220px;
        overflow: hidden;
      }

      #editor .ProseMirror {
        min-height: 220px;
        padding: 12px;
        line-height: 1.55;
        outline: none;
        white-space: pre-wrap;
      }

      #editor .ProseMirror p,
      #editor .ProseMirror h1,
      #editor .ProseMirror h2,
      #editor .ProseMirror blockquote,
      #editor .ProseMirror pre {
        margin: 0 0 0.75em;
      }

      #editor .ProseMirror h1 {
        font-size: 1.5rem;
      }

      #editor .ProseMirror h2 {
        font-size: 1.2rem;
      }

      #editor .ProseMirror blockquote {
        border-left: 3px solid #cbd5e1;
        margin-left: 0;
        padding-left: 12px;
        color: #475569;
      }

      #editor .ProseMirror pre {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .stat {
        font-size: 0.92rem;
        color: #334155;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 999px;
        padding: 6px 10px;
      }

      ol {
        padding-left: 20px;
        margin: 0;
      }

      li + li {
        margin-top: 14px;
      }

      .change {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px;
        background: #fcfdff;
      }

      .change-meta {
        font-size: 0.9rem;
        color: #475569;
        margin-bottom: 8px;
      }

      .patch-list {
        margin: 0;
        padding-left: 18px;
      }

      .patch-list li {
        margin-top: 4px;
      }

      details {
        margin-top: 8px;
      }

      pre {
        overflow-x: auto;
        font-size: 0.85rem;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        padding: 10px;
      }

      .empty {
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Automerge + ProseMirror text demo</h1>
        <p>
          This version uses ProseMirror so you can style text with
          <strong>bold</strong>, <em>italic</em>, <code>code</code>, and heading
          blocks. Automerge still stores the underlying edits and formatting
          changes.
        </p>

        <div class="toolbar" id="toolbar">
          <button type="button" data-command="bold"><strong>B</strong></button>
          <button type="button" data-command="italic"><em>I</em></button>
          <button type="button" data-command="code"><code>Code</code></button>
          <button type="button" data-command="paragraph">P</button>
          <button type="button" data-command="heading-1">H1</button>
          <button type="button" data-command="heading-2">H2</button>
          <button type="button" data-command="undo">Undo</button>
          <button type="button" data-command="redo">Redo</button>
        </div>

        <div class="editor-shell">
          <div id="editor"></div>
        </div>

        <div class="row">
          <div class="stats" id="stats"></div>
          <button id="reset" type="button">Reset document</button>
        </div>
      </section>

      <section class="panel">
        <h2>Changes according to Automerge</h2>
        <div id="history"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
